<!DOCTYPE html>
<html>
<head>
    <title>Student Manager</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .marks {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .avg {
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
        }

        .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            background: #22c55e;
            color: white;
        }

    </style>

</head>
<body>

    <h1>Student Manager Dashboard</h1>

    <div class="container" id="output"></div>

    <script>
        let students = [
            { name: "Darshan", marks: [80, 75, 90] },
            { name: "Rahul", marks: [60, 70, 65] },
            { name: "Anita", marks: [85, 95, 88] }
        ];

        function calculateAverage(marks) {
            let total = 0;
            for (let i = 0; i < marks.length; i++) {
                total += marks[i];
            }
            return total / marks.length;
        }

        function getGrade(avg) {
            if (avg >= 90) return "A";
            else if (avg >= 75) return "B";
            else return "C";
        }

        let output = "";

        for (let i = 0; i < students.length; i++) {
            let avg = calculateAverage(students[i].marks).toFixed(2);
            let grade = getGrade(avg);

            output += `
                <div class="card">
                    <div class="name">${students[i].name}</div>
                    <div class="marks">Marks: ${students[i].marks.join(", ")}</div>
                    <div class="avg">Average: ${avg}</div>
                    <div class="badge">Grade: ${grade}</div>
                </div>
            `;
        }

        document.getElementById("output").innerHTML = output;
    </script>

</body>
</html>
